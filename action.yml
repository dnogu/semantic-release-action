name: 'Semantic Create Release'
description: 'Automated semantic versioning and release creation based on PR labels'
author: 'dnogu'

branding:
  icon: 'tag'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for creating releases and tags'
    required: true

  # Version labels
  major-label:
    description: 'Label name for major version bumps'
    required: false
    default: 'major'
  minor-label:
    description: 'Label name for minor version bumps'
    required: false
    default: 'minor'
  patch-label:
    description: 'Label name for patch version bumps'
    required: false
    default: 'patch'
  prerelease-label:
    description: 'Label name for prerelease versions'
    required: false
    default: 'prerelease'

  # Prerelease configuration
  prerelease-suffix:
    description: 'Suffix to use for prerelease versions (e.g., beta, alpha, rc)'
    required: false
    default: 'beta'
  prerelease-number:
    description: 'Starting number for prerelease versions'
    required: false
    default: '1'

  # Build configuration
  node-version:
    description: 'Node.js version to use for building'
    required: false
    default: '24'
  package-manager:
    description: 'Package manager to use (npm, yarn, pnpm)'
    required: false
    default: 'npm'
  working-directory:
    description: 'Working directory for the action'
    required: false
    default: '.'

  # Commands
  install-command:
    description: 'Command to install dependencies'
    required: false
    default: ''
  test-command:
    description: 'Command to run tests'
    required: false
    default: ''
  build-command:
    description: 'Command to build the project'
    required: false
    default: ''

  # Release configuration
  create-major-release:
    description: 'Whether to create major version releases (v1.2.3, v2.1.0, etc.)'
    required: false
    default: 'true'
  base_release:
    description: 'Whether to update base version tags (v1, v2, etc.) to the latest stable release without creating a separate major-tag release'
    required: false
    default: 'true'
  copy-assets:
    description: 'Whether to copy assets to base version releases'
    required: false
    default: 'true'
  auto-generate-notes:
    description: 'Whether to auto-generate release notes from commits'
    required: false
    default: 'true'

  # Package.json handling
  update-package-json:
    description: 'Legacy package.json toggle. When package-json-mode is not set, true maps to update and false maps to ignore'
    required: false
    default: 'true'
  package-json-mode:
    description: 'How to handle package.json: update, verify, or ignore. Leave empty to fall back to update-package-json'
    required: false
  package-json-path:
    description: 'Path to package.json file'
    required: false
    default: 'package.json'

  # Git configuration
  git-user-name:
    description: 'Git user name for commits'
    required: false
    default: 'github-actions[bot]'
  git-user-email:
    description: 'Git user email for commits'
    required: false
    default: 'github-actions[bot]@users.noreply.github.com'

  commit-changes:
    description: 'Whether to commit and push branch changes before tagging, or back to a PR branch in prepare mode'
    required: false
    default: 'true'

  # Trigger mode
  trigger-mode:
    description: 'How the action was triggered (pr-open, pr-merge, manual, workflow-call, push-main)'
    required: false
    default: 'auto-detect'
  execution-mode:
    description: 'Whether to validate a planned version, prepare a PR branch, or perform the final release (auto-detect, validate, prepare, release)'
    required: false
    default: 'auto-detect'

outputs:
  released:
    description: 'Whether a release was created (true/false)'
  version:
    description: 'The new version number (e.g., v1.2.3)'
  previous-version:
    description: 'The previous version number'
  release-type:
    description: 'Type of release (major/minor/patch/none)'
  is-prerelease:
    description: 'Whether this is a prerelease (true/false)'
  release-url:
    description: 'URL of the created release'
  release-id:
    description: 'ID of the created release'
  major-version:
    description: 'Major version tag (e.g., v1)'
  major-release-url:
    description: 'URL of the release currently targeted by the major version tag'
  tag-name:
    description: 'Git tag name that was created'

runs:
  using: 'node24'
  main: 'dist/index.js'
