name: Major Version Tag Sync

on:
  release:
    types: [published]

jobs:
  sync-major-tag:
    name: Sync Major Version Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event.release.prerelease == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract versions
        id: extract-version
        run: |
          full_version="${{ github.event.release.tag_name }}"
          version_without_v=${full_version#v}
          IFS='.' read -ra VERSION_PARTS <<< "$version_without_v"
          major_version="v${VERSION_PARTS[0]}"

          echo "full_version=$full_version" >> $GITHUB_OUTPUT
          echo "major_version=$major_version" >> $GITHUB_OUTPUT
          echo "Full version: $full_version"
          echo "Major version: $major_version"

      - name: Update major version tag
        run: |
          full_version="${{ steps.extract-version.outputs.full_version }}"
          major_version="${{ steps.extract-version.outputs.major_version }}"

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Force major tag to the same commit as the full semantic version tag.
          target_commit=$(git rev-list -n 1 "$full_version")
          if [ -z "$target_commit" ]; then
            echo "Failed to resolve commit for $full_version"
            exit 1
          fi

          git tag -d "$major_version" 2>/dev/null || true
          git push origin ":refs/tags/$major_version" 2>/dev/null || true
          git tag -a "$major_version" "$target_commit" -m "Major version tag pointing to $full_version"
          git push origin "$major_version"

          echo "Updated major version tag: $major_version -> $full_version"

      - name: Remove major-tag release entry if it exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          major_version="${{ steps.extract-version.outputs.major_version }}"

          if gh release view "$major_version" >/dev/null 2>&1; then
            gh release delete "$major_version" --yes
            echo "Deleted release entry for $major_version to avoid duplicate releases"
          else
            echo "No release entry for $major_version found"
          fi
